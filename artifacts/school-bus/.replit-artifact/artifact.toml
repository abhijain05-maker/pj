kind = "web"
previewPath = "/"
title = "School Bus Management"
version = "1.0.0"
id = "artifacts/school-bus"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22253

[services.development]
run = "pnpm --filter @workspace/school-bus run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/school-bus", "run", "build" ]
publicDir = "artifacts/school-bus/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22253"
BASE_PATH = "/"
